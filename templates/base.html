<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Futuristic Scoring Management{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/">Futuristic Scoring</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/app">Student App</a>
        <a href="#api">API</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>Futuristic Scoring Management © 2026</p>
      <p>Serving academic systems with secure, government-style clarity.</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
